source = ~/.config/hypr/consts.conf

source = ~/.config/hypr/input.conf
source = ~/.config/hypr/binds.conf
source = ~/.config/hypr/decorations.conf
source = ~/.config/hypr/rules.conf

# Monitors
monitorv2 {
    output   = eDP-1
    mode     = 2880x1800@60
    position = 0x0
    scale    = 2
    bitdepth = 10
}

monitorv2 { 
    output   = desc:Acer Technologies ED270R 2223095963W01
    mode     = 1920x1080@143.99
    position = auto-up
}

# Autostart
exec-once = systemctl --user start hyprpolkitagent
exec-once = ignis init
exec-once = elephant
exec-once = hyprpaper
exec-once = iio-hyprland eDP-1
exec-once = wl-paste --type text --watch $clipboard store
exec-once = wl-paste --type image --watch $clipboard store

# Env
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = MOZ_ENABLE_WAYLAND, 1
env = GDK_SCALE, 2

general {
    locale = en_US

    # Default layout
    layout = dwindle

    # Gaps options
    gaps_in = 8
    gaps_out = 16
    gaps_workspaces = 0
    float_gaps = 0

    # Resize options
    no_focus_fallback = false
    resize_on_border = false
    extend_border_grab_area = 0
    hover_icon_on_border = false
    allow_tearing = false
    resize_corner = 0
    modal_parent_blocking = false

    # Borders
    border_size = 2
    col.active_border = $BD_COL_ACTIVE
    col.inactive_border = $BD_COL_INACTIVE
    col.nogroup_border = $BD_COL_GROUP
    col.nogroup_border_active = $BD_COL_GROUP

    snap {
        enabled = false
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true
}
