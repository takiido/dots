source = ~/.config/hypr/consts.conf

decoration {
    rounding = 0
    rounding_power = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
    dim_inactive = true
    dim_strength = 0.07
    dim_special = 0.2
    dim_around = 0.4
    border_part_of_window = true

    blur {
        enabled = true
	    size = 1
	    passes = 4
	    ignore_opacity = true
	    new_optimizations = true
	    xray = false
	    noise = 0.14
	    contrast =  0.45
	    brightness = 0.34
	    vibrancy = 0.5
	    vibrancy_darkness = 0
	    special = false
	    popups = false
	    popups_ignorealpha = 0
	    input_methods = false
	    input_methods_ignorealpha = 0
    }

    shadow {
        enabled = true
	    range = 2
	    render_power = 3
	    sharp = false
	    ignore_window = false
	    color = $SH_COL_ACTIVE
	    color_inactive = $SH_COL_INACTIVE
	    offset = 0 0
	    scale = 1.0
    }
}

animations {
    enabled = true
    workspace_wraparound = true

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 1.5, easeOutQuint
    animation = windowsIn, 1, 1.5, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.5, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}
